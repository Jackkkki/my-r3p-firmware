name: Build Jack's Xiaomi R3P Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Preparing Environment
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/libexec/docker/cli-plugins/docker-buildx
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo u-boot-tools upx-ucl unzip xlsx2csv xmlto xz-utils zlib1g-dev lib32gcc-s1 libc6-dev-i386
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean

      - name: Clone ImmortalWrt Source
        run: |
          git clone -b openwrt-23.05 https://github.com/immortalwrt/immortalwrt.git openwrt

      - name: Update & Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Inject Custom Configuration
        run: |
          cd openwrt
          
          # 1. 精准锁定小米 R3P (Pro) 硬件平台与 512M 架构
          echo "CONFIG_TARGET_ramips=y" > .config
          echo "CONFIG_TARGET_ramips_mt7621=y" >> .config
          echo "CONFIG_TARGET_ramips_mt7621_DEVICE_xiaomi_mir3p=y" >> .config
          
          # 2. 基础汉化与界面设置
          echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
          echo "CONFIG_PACKAGE_luci=y" >> .config
          echo "CONFIG_PACKAGE_luci-theme-bootstrap=y" >> .config
          
          # 3. 核心网络组件 (OpenClash 依赖与 SmartDNS)
          echo "CONFIG_PACKAGE_luci-app-openclash=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-smartdns=y" >> .config
          echo "CONFIG_PACKAGE_dnsmasq-full=y" >> .config
          
          # 4. 无线打印服务器核心 (p910nd + 手机免应用 AirPrint 广播)
          echo "CONFIG_PACKAGE_luci-app-p910nd=y" >> .config
          echo "CONFIG_PACKAGE_kmod-usb-printer=y" >> .config
          echo "CONFIG_PACKAGE_avahi-dbus-daemon=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-usb-printer=y" >> .config
          
          # 5. 网络存储 (Samba4 办公共享功能)
          echo "CONFIG_PACKAGE_luci-app-samba4=y" >> .config
          echo "CONFIG_PACKAGE_automount=y" >> .config
          
          # 6. 虚拟局域网组件
          echo "CONFIG_PACKAGE_luci-app-wireguard=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-tailscale=y" >> .config
          
          # 自动补全结构
          make defconfig

      - name: Download Toolchain & Packages
        run: |
          cd openwrt
          make download -j$(nproc)

      - name: Compile Firmware
        run: |
          cd openwrt
          make -j$(nproc) || make -j1 V=s

      - name: Organize Artifacts
        run: |
          mkdir -p ./deploy
          find openwrt/bin/targets/ramips/mt7621/ -name "*xiaomi*" -o -name "*mir3p*" -o -name "*router-pro*" | xargs -I {} cp -f {} ./deploy/

      - name: Upload Output Firmware
        uses: actions/upload-artifact@v4
        with:
          name: Jack-Xiaomi-R3P-Firmware
          path: ./deploy/
